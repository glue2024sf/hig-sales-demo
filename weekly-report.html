<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>週報入力 | HIG 営業デモ</title>
<link rel="stylesheet" href="app.css">
</head>
<body data-page="weekly">
<div class="wrap">

  <div class="page-head">
    <div class="icon">🗓️</div>
    <div>
      <div class="eyebrow">週報（役職以上が入力）</div>
      <h1>各チャネルの動き 入力</h1>
    </div>
    <div class="actions"><a class="btn" href="dashboard-weekly.html">週報DBで確認 →</a></div>
  </div>

  <div class="demo-note">⚠️ 入力デモ。週報は<b>毎週全員が見る</b>（数値・コミット・各チャネルの動き）。「チャネルの動き」は役職以上が週次入力 → 全員閲覧（ヒアリングI）。</div>

  <div class="grid g2">
    <div class="card">
      <div class="hd">チャネルの動きを入力</div>
      <div class="bd">
        <div class="row2">
          <div class="field"><label><span class="req">★</span>対象週</label>
            <select><option>2026-W25 (6/15-6/19)</option><option>2026-W24</option></select>
          </div>
          <div class="field"><label><span class="req">★</span>チャネル</label>
            <select><option>直販</option><option>東京マツシマ</option><option>JTB商事</option><option>ニシカワヤ</option><option>特販</option></select>
          </div>
        </div>
        <div class="row2">
          <div class="field"><label>今週売上（税抜）</label><input value="¥20,100,000"></div>
          <div class="field"><label>今月コミット</label><input value="¥80,000,000"></div>
        </div>
        <div class="field"><label><span class="req">★</span>主要チェーンの動き</label>
          <textarea>グランビューHD：チェーン開拓が内定へ。本社決済の最終確認待ち。</textarea>
        </div>
        <div class="field"><label>主要案件（複数可）</label>
          <input value="グランビューHD_2026春 新規導入">
        </div>
        <div class="row2">
          <div class="field"><label>ステータス</label>
            <select><option>順調</option><option>交渉継続</option><option>価格調整</option><option>要注意</option></select>
          </div>
          <div class="field"><label>次アクション</label><input value="本社決済の最終確認"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn">先週分をコピー</button>
          <button class="btn primary">保存（最新分として反映）</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="hd">入力済み（今週 W25）</div>
      <div class="bd" style="padding:0">
        <table class="tbl">
          <thead><tr><th>チャネル</th><th>主要チェーンの動き</th><th>状況</th></tr></thead>
          <tbody>
            <tr><td class="lk">直販</td><td>グランビューHD 内定へ</td><td><span class="pill blue">交渉継続</span></td></tr>
            <tr><td class="lk">東京マツシマ</td><td>PB（A〇M）改定提案中</td><td><span class="pill amber">価格調整</span></td></tr>
            <tr><td class="lk">JTB商事</td><td>新規開業2件 引合い</td><td><span class="pill blue">提案準備</span></td></tr>
            <tr><td class="lk">ニシカワヤ</td><td>温浴チャネル深耕</td><td><span class="pill green">順調</span></td></tr>
            <tr><td class="muted">特販</td><td class="muted">未入力</td><td><span class="pill gray">—</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="demo-note" style="margin-top:16px">💡 週次で毎週見たい指標と並び順、目標（予算）データの持ち方（月次×チャネル×担当）は別途打ち合わせ（ヒアリングI）。</div>

</div>
<script src="app.js"></script>
</body>
</html>
