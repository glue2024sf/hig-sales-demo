<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>週次レポート入力 | HIG 営業デモ</title>
<link rel="stylesheet" href="app.css">
</head>
<body data-page="weekly">
<div class="wrap">

  <div class="page-head">
    <div class="icon">🗓️</div>
    <div>
      <div class="eyebrow">週次レポート（チャンネルリーダー用）</div>
      <h1>各チャンネル主要動き 入力</h1>
    </div>
    <div class="actions"><a class="btn" href="dashboard-overall.html">全体MTG DBで確認 →</a></div>
  </div>

  <div class="demo-note">⚠️ 入力デモ。役職級メンバーが<b>週1回1レコード</b>入力 → 全体MTGダッシュボードに最新分のみ表示、過去分は履歴参照。</div>

  <div class="grid g2">
    <div class="card">
      <div class="hd">週次レポートを入力</div>
      <div class="bd">
        <div class="row2">
          <div class="field"><label><span class="req">★</span>対象週</label>
            <select><option>2026-W25 (6/15-6/19)</option><option>2026-W24</option></select>
          </div>
          <div class="field"><label><span class="req">★</span>チャンネル</label>
            <select><option>営業</option><option>物流・生産</option><option>商品企画</option><option>生産消費企画</option></select>
          </div>
        </div>
        <div class="field"><label><span class="req">★</span>今週のトピック</label>
          <textarea>大型提案2件が交渉フェーズ入り。北日本フードは役員同行を調整中。</textarea>
        </div>
        <div class="field"><label>主要案件（複数可）</label>
          <input value="北日本フード_2026春提案, サンライズ製薬_新製品">
        </div>
        <div class="row2">
          <div class="field"><label>ステータス</label>
            <select><option>進行中</option><option>注意</option><option>完了</option></select>
          </div>
          <div class="field"><label>次アクション</label><input value="役員同行を調整"></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn">先週分をコピー</button>
          <button class="btn primary">保存（最新分として反映）</button>
        </div>
        <p class="help">「先週分をコピー」で差分更新でき、入力負荷を抑える。</p>
      </div>
    </div>

    <div class="card">
      <div class="hd">入力済み（今週 W25）</div>
      <div class="bd" style="padding:0">
        <table class="tbl">
          <thead><tr><th>チャンネル</th><th>トピック</th><th>状況</th></tr></thead>
          <tbody>
            <tr><td class="lk">営業</td><td>大型提案2件が交渉入り</td><td><span class="pill blue">進行中</span></td></tr>
            <tr><td class="lk">物流・生産</td><td>飼料在庫逼迫、補充前倒し</td><td><span class="pill amber">注意</span></td></tr>
            <tr><td class="lk">商品企画</td><td>新製品サンプル配布開始</td><td><span class="pill blue">進行中</span></td></tr>
            <tr><td class="muted">生産消費企画</td><td class="muted">未入力</td><td><span class="pill gray">—</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="demo-note" style="margin-top:16px">💡 ※要確認: 入力主体（リーダーのみ/メンバーも）、対象週の締めタイミング。</div>

</div>
<script src="app.js"></script>
</body>
</html>
